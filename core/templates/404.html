{% load static %}
<div class="flex flex-col items-center justify-center min-h-[70vh] px-6 py-16 text-center bg-transparent">
    <div class="relative w-full max-w-lg mb-8 mx-auto flex items-center justify-center group cursor-default">
        <!-- Éléments de décoration (cercles floutés) pour la dynamisation -->
        <div
            class="absolute w-64 h-64 bg-green-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 group-hover:opacity-100 transition duration-1000 animate-blob">
        </div>
        <div
            class="absolute w-64 h-64 bg-[#cbe7f5] rounded-full mix-blend-multiply filter blur-xl opacity-70 group-hover:opacity-100 transition duration-1000 animate-blob animation-delay-2000 -right-4">
        </div>
        <div
            class="absolute w-64 h-64 bg-red-50 rounded-full mix-blend-multiply filter blur-xl opacity-70 group-hover:opacity-100 transition duration-1000 animate-blob animation-delay-4000 -bottom-8">
        </div>

        <div class="relative z-10 flex items-center justify-center">
            <h1
                class="text-[9rem] sm:text-[11rem] font-black text-transparent bg-clip-text bg-gradient-to-br from-[#001e40] via-[#003366] to-green-600 font-['Manrope'] drop-shadow-sm leading-none">
                4<span class="inline-block animate-bounce text-green-500">0</span>4
            </h1>
        </div>
    </div>

    <div
        class="inline-flex items-center gap-2 bg-red-50 text-red-600 px-4 py-2 rounded-full font-semibold text-sm mb-6 border border-red-100 shadow-sm">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Erreur 404 - Contenu introuvable</span>
    </div>

    <h2 class="text-3xl md:text-4xl font-extrabold text-[#001e40] font-['Manrope'] mb-4">
        Oups ! Cette page s'est égarée.
    </h2>

    <p class="text-[#43474f] max-w-lg mx-auto text-lg mb-10 font-['Inter'] leading-relaxed">
        Le lien que vous avez suivi est peut-être rompu, ou la page a été supprimée suite à une mise à jour. Ne vous
        inquiétez pas, vous pouvez retrouver votre chemin.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center w-full max-w-md">
        <a href="{% url 'home' %}"
            class="flex-1 bg-gradient-to-r from-green-500 to-green-600 text-white px-8 py-3.5 rounded-xl font-bold hover:from-green-600 hover:to-green-700 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-3">
            <i class="fa-solid fa-house"></i> Accueil
        </a>
        <button onclick="window.history.back()"
            class="flex-1 bg-white text-[#001e40] px-8 py-3.5 rounded-xl font-bold hover:bg-gray-50 border border-gray-200 hover:border-[#001e40]/30 transition-all duration-300 flex items-center justify-center gap-3 shadow-sm">
            <i class="fa-solid fa-arrow-left"></i> Retour
        </button>
    </div>

    <style>
        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
</div>
