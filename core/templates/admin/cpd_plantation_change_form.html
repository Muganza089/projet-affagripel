{% extends "admin/change_form.html" %}

{% block after_field_sets %}
{{ block.super }}

<style>
/* ===== Webcam capture UI ===== */
.webcam-wrapper {
    margin-top: 10px;
    padding: 16px;
    background: #f8fafb;
    border: 2px dashed #c5d1dc;
    border-radius: 12px;
}
.webcam-wrapper.active {
    border-color: #2563eb;
    background: #eff6ff;
}
.webcam-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
}
.webcam-btn-primary {
    background: #2563eb;
    color: #fff;
}
.webcam-btn-primary:hover { background: #1d4ed8; }
.webcam-btn-success {
    background: #16a34a;
    color: #fff;
}
.webcam-btn-success:hover { background: #15803d; }
.webcam-btn-danger {
    background: #dc2626;
    color: #fff;
}
.webcam-btn-danger:hover { background: #b91c1c; }
.webcam-btn-secondary {
    background: #e5e7eb;
    color: #374151;
}
.webcam-btn-secondary:hover { background: #d1d5db; }

#webcam-video {
    width: 100%;
    max-width: 480px;
    border-radius: 10px;
    background: #000;
    display: block;
    margin: 10px auto;
}
#webcam-canvas {
    display: none;
}
#webcam-preview-img {
    max-width: 480px;
    width: 100%;
    border-radius: 10px;
    border: 3px solid #16a34a;
    display: block;
    margin: 10px auto;
}
.webcam-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
    justify-content: center;
}
.webcam-status {
    text-align: center;
    font-size: 13px;
    color: #6b7280;
    margin-top: 8px;
}
.webcam-status.success {
    color: #16a34a;
    font-weight: 600;
}
</style>

<script>
(function() {
    // ================= TOGGLE PIÈCE D'IDENTITÉ =================
    const FIELD_MAP = {
        'carte_electeur': 'id_numero_carte_electeur',
        'passeport': 'id_numero_passeport',
        'permis_conduire': 'id_numero_permis_conduire',
        'attestation_naissance': 'id_numero_attestation_naissance',
    };

    const ALL_FIELDS = Object.values(FIELD_MAP);

    function getRow(fieldId) {
        const field = document.getElementById(fieldId);
        if (!field) return null;
        return field.closest('.form-row');
    }

    function toggleFields() {
        const selector = document.getElementById('id_type_piece_identite');
        if (!selector) return;
        const selectedValue = selector.value;

        ALL_FIELDS.forEach(function(fieldId) {
            const row = getRow(fieldId);
            if (row) {
                row.style.display = 'none';
            }
        });

        if (selectedValue && FIELD_MAP[selectedValue]) {
            const activeRow = getRow(FIELD_MAP[selectedValue]);
            if (activeRow) {
                activeRow.style.display = '';
            }
        }
    }

    // ================= WEBCAM CAPTURE =================
    let webcamStream = null;

    function injectWebcamUI() {
        // Trouver le champ photo dans le DOM admin
        const photoInput = document.getElementById('id_photo');
        if (!photoInput) return;

        const photoRow = photoInput.closest('.form-row') || photoInput.parentNode;

        // Créer le conteneur webcam
        const wrapper = document.createElement('div');
        wrapper.className = 'webcam-wrapper';
        wrapper.id = 'webcam-wrapper';
        wrapper.innerHTML = `
            <div style="text-align:center; margin-bottom:8px;">
                <span style="font-size:13px; color:#6b7280; font-weight:500;">
                    📸 Ou prendre une photo en temps réel :
                </span>
            </div>
            <div style="text-align:center;">
                <button type="button" class="webcam-btn webcam-btn-primary" id="webcam-start-btn">
                    📷 Activer la caméra
                </button>
            </div>
            <div id="webcam-live-area" style="display:none;">
                <video id="webcam-video" autoplay playsinline></video>
                <div class="webcam-actions">
                    <button type="button" class="webcam-btn webcam-btn-success" id="webcam-capture-btn">
                        📸 Capturer
                    </button>
                    <button type="button" class="webcam-btn webcam-btn-danger" id="webcam-stop-btn">
                        ✖ Fermer la caméra
                    </button>
                </div>
            </div>
            <div id="webcam-preview-area" style="display:none;">
                <img id="webcam-preview-img" alt="Photo capturée" />
                <div class="webcam-actions">
                    <button type="button" class="webcam-btn webcam-btn-primary" id="webcam-retake-btn">
                        🔄 Reprendre
                    </button>
                    <button type="button" class="webcam-btn webcam-btn-success" id="webcam-accept-btn">
                        ✅ Utiliser cette photo
                    </button>
                </div>
            </div>
            <canvas id="webcam-canvas"></canvas>
            <div class="webcam-status" id="webcam-status"></div>
        `;

        photoRow.appendChild(wrapper);

        // Boutons
        const startBtn = document.getElementById('webcam-start-btn');
        const captureBtn = document.getElementById('webcam-capture-btn');
        const stopBtn = document.getElementById('webcam-stop-btn');
        const retakeBtn = document.getElementById('webcam-retake-btn');
        const acceptBtn = document.getElementById('webcam-accept-btn');

        // Zones
        const liveArea = document.getElementById('webcam-live-area');
        const previewArea = document.getElementById('webcam-preview-area');
        const video = document.getElementById('webcam-video');
        const canvas = document.getElementById('webcam-canvas');
        const previewImg = document.getElementById('webcam-preview-img');
        const statusEl = document.getElementById('webcam-status');
        const wrapperEl = document.getElementById('webcam-wrapper');

        // Démarrer la caméra
        startBtn.addEventListener('click', async function() {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = webcamStream;
                liveArea.style.display = 'block';
                startBtn.style.display = 'none';
                previewArea.style.display = 'none';
                wrapperEl.classList.add('active');
                statusEl.textContent = 'Caméra activée — positionnez-vous et cliquez sur « Capturer »';
                statusEl.className = 'webcam-status';
            } catch (err) {
                statusEl.textContent = '❌ Impossible d\'accéder à la caméra : ' + err.message;
                statusEl.className = 'webcam-status';
            }
        });

        // Capturer une image
        captureBtn.addEventListener('click', function() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/png');
            previewImg.src = dataUrl;
            liveArea.style.display = 'none';
            previewArea.style.display = 'block';
            statusEl.textContent = 'Photo capturée — vérifiez et confirmez.';
            statusEl.className = 'webcam-status';
        });

        // Reprendre
        retakeBtn.addEventListener('click', function() {
            previewArea.style.display = 'none';
            liveArea.style.display = 'block';
            statusEl.textContent = 'Caméra activée — positionnez-vous et cliquez sur « Capturer »';
            statusEl.className = 'webcam-status';
        });

        // Accepter la photo capturée
        acceptBtn.addEventListener('click', function() {
            // Convertir le canvas en fichier et l'assigner à l'input file
            canvas.toBlob(function(blob) {
                const fileName = 'capture_' + Date.now() + '.png';
                const file = new File([blob], fileName, { type: 'image/png' });

                // Créer un nouveau DataTransfer pour injecter le fichier
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                photoInput.files = dataTransfer.files;

                // Arrêter la caméra
                stopWebcam();
                previewArea.style.display = 'none';
                startBtn.style.display = 'inline-flex';
                wrapperEl.classList.remove('active');
                statusEl.textContent = '✅ Photo capturée et assignée avec succès !';
                statusEl.className = 'webcam-status success';
            }, 'image/png');
        });

        // Fermer la caméra
        stopBtn.addEventListener('click', function() {
            stopWebcam();
            liveArea.style.display = 'none';
            startBtn.style.display = 'inline-flex';
            wrapperEl.classList.remove('active');
            statusEl.textContent = '';
        });
    }

    function stopWebcam() {
        if (webcamStream) {
            webcamStream.getTracks().forEach(track => track.stop());
            webcamStream = null;
        }
    }

    // ================= INIT =================
    document.addEventListener('DOMContentLoaded', function() {
        // Toggle pièce d'identité
        const selector = document.getElementById('id_type_piece_identite');
        if (selector) {
            toggleFields();
            selector.addEventListener('change', toggleFields);
        }
        // Webcam
        injectWebcamUI();
    });
})();
</script>
{% endblock %}
