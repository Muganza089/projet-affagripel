<section class="max-w-6xl mx-auto px-6 py-12">

  <!-- LIEN POUR OUVRIR LE FORMULAIRE -->
  <div class="mb-6">
    <a href="#" id="openConflictForm" class="text-red-600 underline font-semibold hover:text-red-700">
      Signaler un conflit foncier
    </a>
  </div>

  <!-- FORMULAIRE POPUP -->
  <div id="conflictFormPopup"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center hidden z-50 overflow-auto p-4">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-3xl p-6 mt-12 mb-12 relative">

      <!-- Bouton fermer -->
      <button id="closeConflictForm"
        class="absolute top-3 right-3 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>

      <h2 class="text-2xl font-bold mb-6 text-gray-800">Signaler un conflit foncier</h2>

      <form action="#" method="" enctype="multipart/form-data" class="space-y-4">

        <!-- Nom complet -->
        <div>
          <label for="nom_complet" class="block text-gray-700 font-medium mb-1">Nom complet</label>
          <input type="text" id="nom_complet" name="nom_complet" placeholder="Votre nom complet"
            class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400">
        </div>

        <!-- Pièce d'identité -->
        <div>
          <label for="piece_identite" class="block text-gray-700 font-medium mb-1">Pièce d'identité</label>
          <input type="file" id="piece_identite" name="piece_identite" accept="image/*,.pdf"
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400">
        </div>

        <!-- Description du lieu -->
        <div>
          <label for="lieu_conflit" class="block text-gray-700 font-medium mb-1">Description du lieu du conflit</label>
          <textarea id="lieu_conflit" name="lieu_conflit" rows="2" placeholder="Décrivez le lieu"
            class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400"></textarea>
        </div>

        <!-- Description du conflit -->
        <div>
          <label for="description_conflit" class="block text-gray-700 font-medium mb-1">Description du conflit</label>
          <textarea id="description_conflit" name="description_conflit" rows="3" placeholder="Décrivez le conflit"
            class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400"></textarea>
        </div>

        <!-- Documents liés au conflit -->
        <div>
          <label for="documents_conflit" class="block text-gray-700 font-medium mb-1">Documents liés au conflit</label>
          <input type="file" id="documents_conflit" name="documents_conflit" multiple
            class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400">
          <p class="text-sm text-gray-500 mt-1">Vous pouvez sélectionner plusieurs fichiers.</p>
        </div>

        <!-- Bouton envoyer -->
        <div class="mt-4">
          <button type="submit"
            class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-3 rounded-lg shadow-md transition-all w-full md:w-auto">
            Envoyer
          </button>
        </div>

      </form>
    </div>
  </div>

</section>

<!-- SCRIPT POUR OUVRIR / FERMER LE POPUP -->
<script>
  const openBtn = document.getElementById('openConflictForm');
  const closeBtn = document.getElementById('closeConflictForm');
  const popup = document.getElementById('conflictFormPopup');

  openBtn.addEventListener('click', (e) => {
    e.preventDefault();
    popup.classList.remove('hidden');
  });

  closeBtn.addEventListener('click', () => {
    popup.classList.add('hidden');
  });

  // Fermer le popup en cliquant en dehors du formulaire
  popup.addEventListener('click', (e) => {
    if (e.target === popup) {
      popup.classList.add('hidden');
    }
  });
</script>
