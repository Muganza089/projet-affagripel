<section class="max-w-6xl mx-auto px-6 py-12 bg-[#f8f9fc]">


  <!-- TITRE PRINCIPAL -->
  <h1 class="text-3xl md:text-4xl font-bold text-[#0d121b] mb-8">
    Demande d'audience
  </h1>

  <!-- FORMULAIRE DEMANDE D'AUDIENCE -->
  <div class="bg-yellow-100 p-8 rounded-lg shadow-sm border">
    <form action="#" method="" enctype="multipart/form-data" class="space-y-6">

      <!-- Nom -->
      <div>
        <label for="nom" class="block text-gray-700 font-medium mb-2">Nom complet</label>
        <input type="text" id="nom" name="nom" placeholder="Ex : Israel Muganza shindano"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>


      <!-- Poste -->
      <div>
        <label for="poste" class="block text-gray-700 font-medium mb-2">Poste / Fonction / Profession</label>
        <input type="text" id="poste" name="poste" placeholder="Ex : Agriculteur "
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <!-- Photo de la carte d'identité -->
      <div>
        <label for="photo_id" class="block text-gray-700 font-medium mb-2">Photo de votre carte d'identité</label>
        <input type="file" id="photo_id" name="photo_id" accept="image/*"
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <!-- Lettre -->
      <div>
        <label for="lettre" class="block text-gray-700 font-medium mb-2">Lettre de demande</label>
        <input type="file" id="lettre" name="lettre" accept=".pdf,.doc,.docx"
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <!-- Bouton Envoyer -->
      <div>
        <button type=""
          class="bg-red-400 hover:bg-red-500 text-white font-semibold px-6 py-3 rounded-lg shadow-md transition-all">
          Envoyer la demande
        </button>
      </div>

    </form>
  </div>



</section>
