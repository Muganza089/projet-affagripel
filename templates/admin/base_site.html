{% extends "admin/base.html" %}

{% block title %}{{ title }} | Administration AFFAGRIPEL{% endblock %}

{% block extrahead %}
{{ block.super }}
<!-- Intégration des polices officielles du site -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">Administration AFFAGRIPEL</a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  /* 
   * Définition des couleurs du site pour l'interface Admin Django 
   */
  :root {
    --primary: #001e40;
    --secondary: #003366;
    --accent: #22c55e;
    --primary-fg: #ffffff;

    --body-fg: #43474f;
    --body-bg: #f8fafb;
    --body-quiet-color: #737780;
    --body-loud-color: #191c1d;

    --header-color: #ffffff;
    --header-branding-color: var(--accent);
    --header-bg: var(--primary);
    --header-link-color: var(--primary-fg);

    --breadcrumbs-fg: #cbe7f5;
    --breadcrumbs-link-fg: var(--primary-fg);
    --breadcrumbs-bg: var(--secondary);

    --link-fg: #003366;
    --link-hover-color: #22c55e;
    --link-selected-fg: #ffffff;

    --hairline-color: #e5e7eb;
    --border-color: #f3f4f6;

    --error-fg: #dc2626;

    --message-success-bg: #dcfce7;
    --message-warning-bg: #fef9c3;
    --message-error-bg: #fee2e2;

    --darkened-bg: #f3f4f6;
    --selected-bg: #e0f2fe;
    --selected-row: #f0f9ff;

    --button-fg: #ffffff;
    --button-bg: #22c55e; 
    --button-hover-bg: #16a34a; 
    --default-button-bg: var(--primary);
    --default-button-hover-bg: var(--secondary);

    --object-tools-bg: var(--secondary);
    --object-tools-hover-bg: var(--primary);
  }

  /*
   * TYPOGRAPHIE
   * Application de Inter (contenu) et Manrope (titres)
   */
  body {
      font-family: 'Inter', sans-serif;
      background-color: var(--body-bg);
      color: var(--body-fg);
  }

  h1, h2, h3, h4, h5, #site-name {
      font-family: 'Manrope', sans-serif;
  }
  
  #site-name a {
      font-weight: 800;
      letter-spacing: 0.5px;
  }

  /* 
   * APPLICATION DU DESIGN "CARD" (Moderne & Épuré)
   */
  #content-main .module,
  #content-main fieldset.module,
  #content-main .inline-group,
  .dashboard #content-main .module {
      background: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.05);
      border: 1px solid #f3f4f6;
      overflow: hidden;
      margin-bottom: 2rem;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
  }
  
  #content-main .module:hover,
  .dashboard #content-main .module:hover {
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
      border-color: #e5e7eb;
  }

  /* Entêtes des modules et tables (Dégradé élégant) */
  caption,
  #content-main .module h2,
  fieldset.module h2 {
      background: linear-gradient(to right, #001e40, #003366, #22c55e) !important;
      color: #ffffff !important;
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      padding: 16px 24px !important;
      letter-spacing: 0.5px;
      font-size: 1.1rem;
      border-radius: 0;
  }

  caption a.section:link, caption a.section:visited {
      color: #ffffff !important;
      font-weight: 800;
  }

  /*
   * TABLEAUX DES LISTES (Changelist)
   */
  #changelist #toolbar {
      background: #f8fafb;
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      border-radius: 1.25rem 1.25rem 0 0;
  }

  #changelist table {
      width: 100%;
  }

  #changelist table thead th {
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      border-bottom: 2px solid var(--border-color);
      background: #f9fafb;
  }

  #changelist table tbody tr td,
  #changelist table tbody tr th {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
  }

  #changelist table tbody tr:hover {
      background-color: var(--selected-row);
      transition: background-color 0.2s ease;
  }

  /* 
   * FORMULAIRES (Changeform) 
   */
  .form-row {
      padding: 20px 24px;
      border-bottom: 1px solid var(--hairline-color);
  }
  
  .form-row:last-child {
      border-bottom: none;
  }

  .form-row > div > label {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
  }

  /* 
   * BOUTON D'ENREGISTREMENT ET ACTIONS
   */
  .submit-row {
      background: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #f3f4f6;
      padding: 20px 24px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
  }
  
  input[type=submit], button, .button, .submit-row input {
      border-radius: 0.75rem;
      padding: 12px 24px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      cursor: pointer;
  }

  input[type=submit].default, .submit-row input.default {
      background: linear-gradient(to right, #22c55e, #16a34a);
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
      border: none;
      color: white;
  }
  
  input[type=submit].default:hover {
      box-shadow: 0 8px 15px rgba(34, 197, 94, 0.4);
      transform: translateY(-2px);
  }

  /* Object Tools (Boutons en haut à droite comme Ajouter) */
  .object-tools a, .object-tools a:link, .object-tools a:visited {
      background: var(--object-tools-bg);
      border-radius: 0.75rem;
      padding: 10px 20px;
      font-weight: 600;
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  .object-tools a:hover {
      background: var(--object-tools-hover-bg);
      transform: translateY(-1px);
  }

  /* 
   * INPUTS MODERNES 
   */
  input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], input[type=tel], textarea, select {
      border-radius: 0.5rem;
      border: 1px solid #d1d5db;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background-color: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
      width: 100%;
      max-width: 600px; /* Limite la largeur pour l'harmonie */
  }

  input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, input[type=url]:focus, input[type=number]:focus, input[type=tel]:focus, textarea:focus, select:focus {
      border-color: #22c55e;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
      outline: none;
  }
  
  textarea {
      min-height: 120px;
  }
  
  /* Select boxes */
  select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%234b5563%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat, repeat;
      background-position: right .7em top 50%, 0 0;
      background-size: .65em auto, 100%;
      padding-right: 2.5em;
  }

  /* Fil d'ariane (Breadcrumbs) */
  div.breadcrumbs {
      padding: 12px 24px;
      font-size: 0.9rem;
      background: var(--secondary);
      color: var(--breadcrumbs-fg);
      border-radius: 0 0 1rem 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  }
  div.breadcrumbs a {
      color: var(--breadcrumbs-link-fg);
      font-weight: 500;
  }
  div.breadcrumbs a:hover {
      color: var(--accent);
  }

  /* Sidebar Django (s'il y en a une, souvent Django > 3) */
  #nav-sidebar {
      background: #ffffff;
      border-right: 1px solid var(--border-color);
  }
  .current-app .section:link, .current-app .section:visited {
      color: var(--primary) !important;
  }
  #nav-sidebar .current-model {
      background: var(--selected-bg);
  }
</style>
{% endblock %}
